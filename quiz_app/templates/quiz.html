<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz em andamento</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(160deg, #020617, #0f172a 45%, #1e293b);
      color: #f8fafc;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(860px, 100%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
    }
    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .badge {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 14px;
      border-radius: 16px;
      font-weight: 700;
    }
    h2 { font-size: clamp(1.6rem, 4vw, 2.2rem); }
    .options { display: grid; gap: 12px; margin-top: 18px; }
    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      cursor: pointer;
    }
    .option input { transform: scale(1.2); }
    button {
      margin-top: 20px;
      border: none;
      border-radius: 16px;
      padding: 15px 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      cursor: pointer;
      opacity: .5;
    }
    button.enabled { opacity: 1; }
    #msg { min-height: 24px; color: #fca5a5; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="badge">Participante: {{ participant_name }}</div>
      <div class="badge">Pergunta {{ current_number }}/{{ total_questions }}</div>
      <div class="badge">⏱️ <span id="timer">{{ remaining_seconds }}</span>s</div>
    </div>

    <h2>{{ question.question }}</h2>

    <div class="options">
      {% for option in question.options %}
        <label class="option">
          <input type="radio" name="answer" value="{{ loop.index0 }}">
          <span>{{ option }}</span>
        </label>
      {% endfor %}
    </div>

    <button id="confirmBtn" disabled>Confirmar</button>
    <div id="msg"></div>
  </div>

  <script>
    const btn = document.getElementById('confirmBtn');
    const msg = document.getElementById('msg');
    document.querySelectorAll('input[name="answer"]').forEach(input => {
      input.addEventListener('change', () => {
        btn.disabled = false;
        btn.classList.add('enabled');
      });
    });

    btn.addEventListener('click', async () => {
      const selected = document.querySelector('input[name="answer"]:checked');
      if (!selected) {
        msg.textContent = 'Selecione uma alternativa antes de confirmar.';
        return;
      }
      const response = await fetch('/answer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ selected_index: Number(selected.value) })
      });
      const data = await response.json();
      if (!response.ok) {
        msg.textContent = data.message || 'Erro ao confirmar resposta.';
        return;
      }
      window.location.href = data.redirect;
    });

    let remaining = {{ remaining_seconds }};
    const timerEl = document.getElementById('timer');
    setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        timerEl.textContent = '0';
        window.location.href = '/result';
        return;
      }
      timerEl.textContent = String(remaining);
    }, 1000);
  </script>
</body>
</html>
