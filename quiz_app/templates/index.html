<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 𝑩𝒂𝒕𝒂𝒍𝒉𝒂 𝒅𝒆 𝑴𝒆𝒏𝒕𝒆𝒔 ⚔️ FASE 1 </title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --accent-2: #38bdf8;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: radial-gradient(circle at top, #1d4ed8 0%, #0f172a 40%, #020617 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap { width: min(920px, 100%); }
    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }
    .dev-box {
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(16px);
    }
    h1 { margin-top: 0; font-size: clamp(2rem, 5vw, 3.5rem); }
    p { color: var(--muted); }
    input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      outline: none;
      font-size: 1rem;
    }
    input::placeholder { color: #94a3b8; }
    .field { margin: 18px 0; }
    .elements {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      user-select: none;
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    button {
      border: none;
      border-radius: 16px;
      padding: 15px 22px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    button:hover { transform: translateY(-1px); }
    .primary { background: linear-gradient(135deg, var(--accent), #16a34a); color: white; }
    .secondary { background: linear-gradient(135deg, var(--accent-2), #2563eb); color: white; }
    .disabled { opacity: .45; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      min-height: 24px;
      font-weight: 700;
    }
    .open { color: #86efac; }
    .closed { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="dev-box">
        <label for="devPassword">Senha Dev:</label>
        <input id="devPassword" type="password" maxlength="4" inputmode="numeric" style="width: 120px; padding: 10px 12px;">
        <button class="secondary" id="devBtn">Entrar</button>
      </div>
    </div>

    <div class="card">
      <h1>🧠 𝑩𝒂𝒕𝒂𝒍𝒉𝒂 𝒅𝒆 𝑴𝒆𝒏𝒕𝒆𝒔 ⚔️ FASE 1</h1>
      <p>Digite seu nome com pelo menos 3 caracteres e inclua seu elemento. Exemplo: <strong>Léo ⚡</strong></p>
      <p class="status {{ 'open' if quiz_open else 'closed' }}">{{ 'Quiz aberto para respostas.' if quiz_open else 'Quiz fechado no momento.' }}</p>

      <div class="field">
        <label for="name">Insira seu nome:</label>
        <input id="name" type="text" placeholder="Ex.: LGhostt 🔥, El King 💧" maxlength="40" />
      </div>

      <div>
        <strong>Elementos obrigatórios:</strong>
        <div class="elements">
          {% for elemento in elementos %}
            <span class="pill" onclick="addElement('{{ elemento }}')">{{ elemento }}</span>
          {% endfor %}
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="startBtn">Iniciar!</button>
      </div>

      <div id="message" class="status"></div>
    </div>
  </div>

  <script>
    function addElement(el) {
      const input = document.getElementById('name');
      if (!input.value.includes(el)) {
        input.value = (input.value + ' ' + el).trim();
      }
      input.focus();
    }

    const msg = document.getElementById('message');

    document.getElementById('startBtn').addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim();
      const response = await fetch('/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ name })
      });
      const data = await response.json();
      msg.textContent = data.message || '';
      msg.style.color = response.ok ? '#86efac' : '#fca5a5';
      if (data.ok && data.redirect) {
        window.location.href = data.redirect;
      }
    });

    document.getElementById('devBtn').addEventListener('click', async () => {
      const password = document.getElementById('devPassword').value;
      const response = await fetch('/dev/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ password })
      });
      const data = await response.json();
      msg.textContent = data.message || (data.ok ? 'Entrando no painel DEV...' : 'Erro ao entrar no painel DEV.');
      msg.style.color = response.ok ? '#86efac' : '#fca5a5';
      if (data.ok && data.redirect) {
        window.location.href = data.redirect;
      }
    });
  </script>
</body>
</html>
